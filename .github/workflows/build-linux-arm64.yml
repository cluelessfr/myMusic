name: Build Linux ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download bundled FFmpeg
        run: |
          mkdir -p tools/ffmpeg/bin
          curl -fL --retry 5 --retry-all-errors --connect-timeout 30 -o ffmpeg-linux-arm64.tar.xz https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linuxarm64-gpl.tar.xz
          mkdir ffmpeg-extract
          tar -xJf ffmpeg-linux-arm64.tar.xz -C ffmpeg-extract
          cp "$(find ffmpeg-extract -type f -name ffmpeg -perm -111 | head -n 1)" tools/ffmpeg/bin/ffmpeg
          find ffmpeg-extract -type f \( -iname "GPL*" -o -iname "LICENSE*" \) -print -quit | xargs -r -I{} cp "{}" tools/ffmpeg/LICENSE
          find ffmpeg-extract -type f -iname "README*" -print -quit | xargs -r -I{} cp "{}" tools/ffmpeg/README.txt
          chmod +x tools/ffmpeg/bin/ffmpeg

      - name: Download bundled Deno
        run: |
          mkdir -p tools/deno/bin
          curl -fL --retry 5 --retry-all-errors --connect-timeout 30 -o deno.zip https://github.com/denoland/deno/releases/latest/download/deno-aarch64-unknown-linux-gnu.zip
          unzip deno.zip
          mv deno tools/deno/bin/deno
          chmod +x tools/deno/bin/deno

      - name: Verify bundled tools
        run: |
          test "$(uname -m)" = "aarch64"
          tools/ffmpeg/bin/ffmpeg -version | head -n 1
          file tools/ffmpeg/bin/ffmpeg
          tools/deno/bin/deno --version
          file tools/deno/bin/deno

      - name: Validate Python files
        run: python -m compileall -q src tools test

      - name: Build Linux ARM64 app
        run: pyinstaller --clean myMusic-linux.spec

      - name: Create Linux ARM64 archive
        run: |
          tar -czf myMusic-v1.4.1-linux-arm64.tar.gz -C dist myMusic
          sha256sum myMusic-v1.4.1-linux-arm64.tar.gz

      - name: Upload Linux ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: myMusic-v1.4.1-linux-arm64
          path: myMusic-v1.4.1-linux-arm64.tar.gz
