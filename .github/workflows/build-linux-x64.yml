name: Build Linux x64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download bundled FFmpeg
        run: |
          mkdir -p tools/ffmpeg/bin
          curl -fL --retry 5 --retry-all-errors --connect-timeout 30 -o ffmpeg-linux-x64.tar.xz https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          mkdir ffmpeg-extract
          tar -xJf ffmpeg-linux-x64.tar.xz -C ffmpeg-extract
          cp "$(find ffmpeg-extract -type f -name ffmpeg -perm -111 | head -n 1)" tools/ffmpeg/bin/ffmpeg
          cp "$(find ffmpeg-extract -type f -name ffprobe -perm -111 | head -n 1)" tools/ffmpeg/bin/ffprobe
          find ffmpeg-extract -type f \( -iname "GPL*" -o -iname "LICENSE*" \) -print -quit | xargs -r -I{} cp "{}" tools/ffmpeg/
          find ffmpeg-extract -type f -iname "README*" -print -quit | xargs -r -I{} cp "{}" tools/ffmpeg/
          chmod +x tools/ffmpeg/bin/ffmpeg
          chmod +x tools/ffmpeg/bin/ffprobe

      - name: Download bundled Deno
        run: |
          mkdir -p tools/deno/bin
          curl -fL --retry 5 --retry-all-errors --connect-timeout 30 -o deno.zip https://github.com/denoland/deno/releases/latest/download/deno-x86_64-unknown-linux-gnu.zip
          unzip deno.zip
          mv deno tools/deno/bin/deno
          chmod +x tools/deno/bin/deno

      - name: Verify bundled tools
        run: |
          tools/ffmpeg/bin/ffmpeg -version | head -n 1
          tools/ffmpeg/bin/ffprobe -version | head -n 1
          ldd tools/ffmpeg/bin/ffmpeg || true
          tools/deno/bin/deno --version

      - name: Validate Python files
        run: python -m compileall -q src tools test

      - name: Build Linux x64 app
        run: pyinstaller --clean myMusic-linux.spec

      - name: Create Linux x64 archive
        run: |
          tar -czf myMusic-v1.3.0-linux-x64.tar.gz -C dist myMusic
          sha256sum myMusic-v1.3.0-linux-x64.tar.gz

      - name: Upload Linux x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: myMusic-v1.3.0-linux-x64
          path: myMusic-v1.3.0-linux-x64.tar.gz
